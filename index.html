<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Kanban Board <span id="task-counter">0</span></h1>
        <div class="controls">
            <label for="priority-filter">Filter:</label>
            <select id="priority-filter">
                <option value="all">All Priorities</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>
    </header>

    <main class="board">
        <section id="todo" class="column">
            <h2>To Do</h2>
            <ul class="task-list"></ul>
            <button class="add-btn" data-col="todo">+ Add Task</button>
        </section>

        <section id="inprogress" class="column">
            <h2>In Progress</h2>
            <ul class="task-list"></ul>
            <button class="add-btn" data-col="inprogress">+ Add Task</button>
        </section>

        <section id="done" class="column">
            <h2>Done <button id="clear-done">Clear All</button></h2>
            <ul class="task-list"></ul>
            <button class="add-btn" data-col="done">+ Add Task</button>
        </section>
    </main>

    <div id="task-modal" class="modal is-hidden">
        <div class="modal-content">
            <h3 id="modal-title-text">New Task</h3>
            <input type="text" id="task-title-input" placeholder="Title">
            <textarea id="task-desc-input" placeholder="Description"></textarea>
            <select id="task-priority-input">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <input type="date" id="task-date-input">
            <div class="modal-actions">
                <button id="save-task">Save</button>
                <button id="cancel-task">Cancel</button>
            </div>
        </div>
    </div>

    <script src="taskmanager.js"></script>
</body>
</html>
